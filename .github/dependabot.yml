# Dependabot will open PRs to update GitHub Actions (and other deps).
# When you merge, it updates the commit SHA in the workflow; always confirm
# the new commit is from the official repo (no "imposter commit" warning on GitHub).

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
