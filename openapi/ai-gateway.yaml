        - keyRedacted
      properties:
        id:
          type: string
          description: Provider key ID.
        name:
          type: string
          description: User-defined label.
        keyRedacted:
          type: string
          description: Redacted display form of the key value.
    RouterStep:
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - user
            - ngrok
        keys:
          type: array
          items:
            $ref: '#/components/schemas/RouterStepKey'
        keySelectionStrategy:
          type: string
          enum:
            - ordered
    RouterRule:
      type: object
      additionalProperties: false
      required:
        - steps
      properties:
        provider:
          type: string
        model:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/RouterStep'
    Router:
      type: object
      additionalProperties: false
      properties:
