openapi: 3.0.3
info:
  title: AI Gateway APIs
  version: 0.1.0
  description: |
    Control-plane HTTP APIs served by the ai-gateway-control service.
servers:
  - url: https://api.ngrok.ai
security:
  - bearerAuth: []
tags:
  - name: AI Gateway Access Key Configurations
    description: Manage reusable access key configurations (scope and routing rules).
  - name: AI Gateway Access Keys
    description: Manage ngrok-managed access keys associated with AI Gateway endpoints.
  - name: AI Gateway Configuration
    description: Manage per-account AI Gateway configuration (timeouts, token caps, metadata).
  - name: AI Gateway API Keys
    description: Manage customer-facing AI Gateway API Keys.
  - name: AI Gateway Credits
    description: Purchase AI Gateway credits via Stripe Checkout.
  - name: AI Gateway Providers
    description: Manage AI Gateway providers and the models they expose.
  - name: AI Gateway Custom Providers
    description: Manage custom AI Gateway providers and the models they expose.
  - name: AI Gateway Provider Keys
    description: Manage provider keys attached to AI Gateway managed access keys.
  - name: AI Gateway Usage
    description: Read-only AI Gateway usage events and aggregated usage overview for the authenticated account.
paths:
  /access-key-configurations:
    get:
      tags:
        - AI Gateway Access Key Configurations
      summary: List AI Gateway access key configurations
      description: List all AI Gateway access key configurations owned by the authenticated account.
      operationId: ListAIGatewayAccessKeyConfigurations
      parameters:
        - $ref: '#/components/parameters/BeforeID'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of AI Gateway access key configurations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAccessKeyConfigurationList'
        default:
          $ref: '#/components/responses/Error'
    head:
      tags:
        - AI Gateway Access Key Configurations
      summary: Check AI Gateway access key configurations collection availability
      description: HEAD variant of list AI Gateway access key configurations.
      operationId: HeadAIGatewayAccessKeyConfigurations
      parameters:
        - $ref: '#/components/parameters/BeforeID'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: The AI Gateway access key configurations collection is available.
        default:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - AI Gateway Access Key Configurations
      summary: Create an AI Gateway access key configuration
      description: |
        Create a reusable access key configuration with provider/model scope
        and routing rules. Attach it to access keys to control which providers
        and models each key may call and with what credentials.
      operationId: CreateAIGatewayAccessKeyConfiguration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayAccessKeyConfigurationCreate'
      responses:
        '201':
          description: The created AI Gateway access key configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAccessKeyConfiguration'
        default:
          $ref: '#/components/responses/Error'
  /access-key-configurations/{id}:
    parameters:
      - $ref: '#/components/parameters/AIGatewayAccessKeyConfigurationID'
    get:
      tags:
        - AI Gateway Access Key Configurations
      summary: Get an AI Gateway access key configuration
      description: Get a single AI Gateway access key configuration by ID.
      operationId: GetAIGatewayAccessKeyConfiguration
      responses:
        '200':
          description: The AI Gateway access key configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAccessKeyConfiguration'
        default:
          $ref: '#/components/responses/Error'
    head:
      tags:
        - AI Gateway Access Key Configurations
      summary: Check AI Gateway access key configuration availability
      description: HEAD variant of get AI Gateway access key configuration.
      operationId: HeadAIGatewayAccessKeyConfiguration
      responses:
        '200':
          description: The AI Gateway access key configuration exists.
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
        - AI Gateway Access Key Configurations
      summary: Update an AI Gateway access key configuration
      description: |
        Apply a partial update to an AI Gateway access key configuration.
        Omit a field to leave it unchanged; send null to clear it.
      operationId: UpdateAIGatewayAccessKeyConfiguration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayAccessKeyConfigurationUpdate'
      responses:
        '200':
          description: The updated AI Gateway access key configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAccessKeyConfiguration'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - AI Gateway Access Key Configurations
      summary: Delete an AI Gateway access key configuration
      description: |
        Delete an AI Gateway access key configuration by ID.
        Fails when the configuration is still referenced by an access key.
      operationId: DeleteAIGatewayAccessKeyConfiguration
      responses:
        '204':
          description: The AI Gateway access key configuration was deleted.
        default:
          $ref: '#/components/responses/Error'
  /access-keys:
    get:
      tags:
        - AI Gateway Access Keys
      summary: List AI Gateway access keys
      description: List all AI Gateway access keys owned by the authenticated account.
      operationId: ListAIGatewayAccessKeys
      parameters:
        - $ref: '#/components/parameters/BeforeID'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of AI Gateway access keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAccessKeyList'
        default:
          $ref: '#/components/responses/Error'
    head:
      tags:
        - AI Gateway Access Keys
      summary: Check AI Gateway access keys collection availability
      description: HEAD variant of list AI Gateway access keys.
      operationId: HeadAIGatewayAccessKeys
      parameters:
        - $ref: '#/components/parameters/BeforeID'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: The AI Gateway access keys collection is available.
        default:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - AI Gateway Access Keys
      summary: Create an AI Gateway access key
      description: Create a new ngrok-managed access key for AI Gateway traffic.
      operationId: CreateAIGatewayAccessKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayAccessKeyCreate'
      responses:
        '201':
          description: The created AI Gateway access key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAccessKey'
        default:
          $ref: '#/components/responses/Error'
  /access-keys/{id}:
    parameters:
      - $ref: '#/components/parameters/AIGatewayAccessKeyID'
    get:
      tags:
        - AI Gateway Access Keys
      summary: Get an AI Gateway access key
      description: Get a single AI Gateway access key by ID.
      operationId: GetAIGatewayAccessKey
      responses:
        '200':
          description: The AI Gateway access key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAccessKey'
        default:
          $ref: '#/components/responses/Error'
    head:
      tags:
        - AI Gateway Access Keys
      summary: Check AI Gateway access key availability
      description: HEAD variant of get AI Gateway access key.
      operationId: HeadAIGatewayAccessKey
      responses:
        '200':
          description: The AI Gateway access key exists.
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
        - AI Gateway Access Keys
      summary: Update an AI Gateway access key
      description: Update mutable fields on an existing AI Gateway access key.
      operationId: UpdateAIGatewayAccessKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayAccessKeyUpdate'
      responses:
        '200':
          description: The updated AI Gateway access key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAccessKey'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - AI Gateway Access Keys
      summary: Delete an AI Gateway access key
      description: Delete an AI Gateway access key by ID.
      operationId: DeleteAIGatewayAccessKey
      responses:
        '204':
          description: The AI Gateway access key was deleted.
        default:
          $ref: '#/components/responses/Error'
  /api-keys:
    get:
      tags:
        - AI Gateway API Keys
      summary: List AI Gateway API keys
      description: List all AI Gateway API keys owned by the authenticated account.
      operationId: ListAIGatewayAPIKeys
      parameters:
        - $ref: '#/components/parameters/BeforeID'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of AI Gateway API keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAPIKeyList'
        default:
          $ref: '#/components/responses/Error'
    head:
      tags:
        - AI Gateway API Keys
      summary: Check AI Gateway API keys collection availability
      description: HEAD variant of list AI Gateway API keys.
      operationId: HeadAIGatewayAPIKeys
      parameters:
        - $ref: '#/components/parameters/BeforeID'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: The AI Gateway API keys collection is available.
        default:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - AI Gateway API Keys
      summary: Create an AI Gateway API key
      description: Create a new AI Gateway API key for the authenticated account.
      operationId: CreateAIGatewayAPIKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayAPIKeyCreate'
      responses:
        '201':
          description: The created AI Gateway API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAPIKey'
        default:
          $ref: '#/components/responses/Error'
  /api-keys/{id}:
    parameters:
      - $ref: '#/components/parameters/AIGatewayAPIKeyID'
    get:
      tags:
        - AI Gateway API Keys
      summary: Get an AI Gateway API key
      description: Get a single AI Gateway API key by ID.
      operationId: GetAIGatewayAPIKey
      responses:
        '200':
          description: The AI Gateway API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAPIKey'
        default:
          $ref: '#/components/responses/Error'
    head:
      tags:
        - AI Gateway API Keys
      summary: Check AI Gateway API key availability
      description: HEAD variant of get AI Gateway API key.
      operationId: HeadAIGatewayAPIKey
      responses:
        '200':
          description: The AI Gateway API key exists.
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
        - AI Gateway API Keys
      summary: Update an AI Gateway API key
      description: Update mutable fields on an existing AI Gateway API key.
      operationId: UpdateAIGatewayAPIKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayAPIKeyUpdate'
      responses:
        '200':
          description: The updated AI Gateway API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayAPIKey'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - AI Gateway API Keys
      summary: Delete an AI Gateway API key
      description: Delete an AI Gateway API key by ID.
      operationId: DeleteAIGatewayAPIKey
      responses:
        '204':
          description: The AI Gateway API key was deleted.
        default:
          $ref: '#/components/responses/Error'
  /provider-keys:
    get:
      tags:
        - AI Gateway Provider Keys
      summary: List AI Gateway provider keys
      description: List all AI Gateway provider keys owned by the authenticated account.
      operationId: ListAIGatewayProviderAPIKeys
      parameters:
        - $ref: '#/components/parameters/BeforeID'
        - $ref: '#/components/parameters/Limit'
        - name: provider
          in: query
          required: false
          description: Only returns keys matching the provider.
          schema:
            type: string
      responses:
        '200':
          description: A page of AI Gateway provider keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayProviderAPIKeyList'
        default:
          $ref: '#/components/responses/Error'
    head:
      tags:
        - AI Gateway Provider Keys
      summary: Check AI Gateway provider keys collection availability
      description: HEAD variant of list AI Gateway provider keys.
      operationId: HeadAIGatewayProviderAPIKeys
      parameters:
        - $ref: '#/components/parameters/BeforeID'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: The AI Gateway provider keys collection is available.
        default:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - AI Gateway Provider Keys
      summary: Create an AI Gateway provider key
      description: Create a new AI Gateway provider key attached to a managed access key.
      operationId: CreateAIGatewayProviderAPIKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayProviderAPIKeyCreate'
      responses:
        '201':
          description: The created AI Gateway provider key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayProviderAPIKeyDetail'
        default:
          $ref: '#/components/responses/Error'
  /provider-keys/{id}:
    parameters:
      - $ref: '#/components/parameters/AIGatewayProviderAPIKeyID'
    get:
      tags:
        - AI Gateway Provider Keys
      summary: Get an AI Gateway provider key
      description: Get a single AI Gateway provider key by ID.
      operationId: GetAIGatewayProviderAPIKey
      responses:
        '200':
          description: The AI Gateway provider key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayProviderAPIKeyDetail'
        default:
          $ref: '#/components/responses/Error'
    head:
      tags:
        - AI Gateway Provider Keys
      summary: Check AI Gateway provider key availability
      description: HEAD variant of get AI Gateway provider key.
      operationId: HeadAIGatewayProviderAPIKey
      responses:
        '200':
          description: The AI Gateway provider key exists.
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
        - AI Gateway Provider Keys
      summary: Update an AI Gateway provider key
      description: Update mutable fields on an existing AI Gateway provider key.
      operationId: UpdateAIGatewayProviderAPIKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayProviderAPIKeyUpdate'
      responses:
        '200':
          description: The updated AI Gateway provider key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayProviderAPIKeyDetail'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - AI Gateway Provider Keys
      summary: Delete an AI Gateway provider key
      description: Delete an AI Gateway provider key by ID.
      operationId: DeleteAIGatewayProviderAPIKey
      responses:
        '204':
          description: The AI Gateway provider key was deleted.
        default:
          $ref: '#/components/responses/Error'
  /provider-keys/{id}/rotate:
    parameters:
      - $ref: '#/components/parameters/AIGatewayProviderAPIKeyID'
    post:
      tags:
        - AI Gateway Provider Keys
      summary: Rotate an AI Gateway provider key
      description: Update an AI Gateway provider key by ID to a new value.
      operationId: RotateAIGatewayProviderAPIKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayProviderAPIKeyRotate'
      responses:
        '200':
          description: The updated AI Gateway provider key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayProviderAPIKeyDetail'
        default:
          $ref: '#/components/responses/Error'
  /providers:
    get:
      tags:
        - AI Gateway Providers
      summary: List AI Gateway providers
      description: |
        List all user-defined AI Gateway providers for the authenticated account. Built-in
        providers come from the ngrok catalog, not this resource.
      operationId: ListAIGatewayProviders
      parameters:
        - $ref: '#/components/parameters/BeforeID'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of AI Gateway providers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayProviderList'
        default:
          $ref: '#/components/responses/Error'
    head:
      tags:
        - AI Gateway Providers
      summary: Check AI Gateway providers collection availability
      description: HEAD variant of list AI Gateway providers.
      operationId: HeadAIGatewayProviders
      parameters:
        - $ref: '#/components/parameters/BeforeID'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: The AI Gateway providers collection is available.
        default:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - AI Gateway Providers
      summary: Create an AI Gateway provider
      description: |
        Create a new user-defined AI Gateway provider for routing requests to a self-hosted
        or third-party LLM endpoint. Built-in ngrok providers come from the catalog and are
        not created here.
      operationId: CreateAIGatewayProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayProviderCreate'
      responses:
        '201':
          description: The created AI Gateway provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayProvider'
        default:
          $ref: '#/components/responses/Error'
  /providers/{id}:
    parameters:
      - $ref: '#/components/parameters/AIGatewayProviderID'
    get:
      tags:
        - AI Gateway Providers
      summary: Get an AI Gateway provider
      description: Get a single AI Gateway provider by ID.
      operationId: GetAIGatewayProvider
      responses:
        '200':
          description: The AI Gateway provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayProvider'
        default:
          $ref: '#/components/responses/Error'
    head:
      tags:
        - AI Gateway Providers
      summary: Check AI Gateway provider availability
      description: HEAD variant of get AI Gateway provider.
      operationId: HeadAIGatewayProvider
      responses:
        '200':
          description: The AI Gateway provider exists.
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
        - AI Gateway Providers
      summary: Update an AI Gateway provider
      description: |
        Apply a partial update to an AI Gateway provider. The providerId is immutable after
        creation. Models follow REST PATCH-array semantics: omit the field to leave existing
        models alone, send an empty array to clear all models, or send a full list to replace
        the existing set.
      operationId: UpdateAIGatewayProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayProviderUpdate'
      responses:
        '200':
          description: The updated AI Gateway provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayProvider'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - AI Gateway Providers
      summary: Delete an AI Gateway provider
      description: |
        Delete an AI Gateway provider and all of its models. Deletion is blocked while the
        provider is referenced by a provider key or an access key configuration entry; detach
        or delete those references first.
      operationId: DeleteAIGatewayProvider
      responses:
        '204':
          description: The AI Gateway provider was deleted.
        '409':
          description: The provider is referenced by a provider key or an access key configuration entry and cannot be deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/Error'
  /credits/transactions:
    get:
      tags:
        - AI Gateway Credits
      summary: List credit transactions
      description: Returns a merged, date-descending list of credit purchases and metered usage invoices for the account. Queried from Stripe in real time.
      operationId: GetCreditTransactions
      responses:
        '200':
          description: The credit transaction history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditTransactionList'
        default:
          $ref: '#/components/responses/Error'
  /credits/balance:
    get:
      tags:
        - AI Gateway Credits
      summary: Get credit balance
      description: Get the account's current AI Gateway credit balance. Eventually consistent with usage events.
      operationId: GetCreditBalance
      responses:
        '200':
          description: The current credit balance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditBalance'
        default:
          $ref: '#/components/responses/Error'
  /credits/checkout-session:
    post:
      tags:
        - AI Gateway Credits
      summary: Create a Stripe checkout session
      description: Create a Stripe-hosted checkout session to purchase AI Gateway credits.
      operationId: CreateCheckoutSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutSessionCreate'
      responses:
        '200':
          description: The created checkout session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSession'
        default:
          $ref: '#/components/responses/Error'
  /gateway-config:
    get:
      tags:
        - AI Gateway Configuration
      summary: Get AI Gateway configuration
      description: Get the AI Gateway configuration for the authenticated account.
      operationId: GetAIGatewayConfig
      responses:
        '200':
          description: The AI Gateway configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayConfig'
        default:
          $ref: '#/components/responses/Error'
    head:
      tags:
        - AI Gateway Configuration
      summary: Check AI Gateway configuration availability
      description: HEAD variant of get AI Gateway configuration.
      operationId: HeadAIGatewayConfig
      responses:
        '200':
          description: The AI Gateway configuration is available.
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
        - AI Gateway Configuration
      summary: Update AI Gateway configuration
      description: Update the AI Gateway configuration for the authenticated account. Omitted fields preserve their existing stored value.
      operationId: UpdateAIGatewayConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIGatewayConfigUpdate'
      responses:
        '200':
          description: The updated AI Gateway configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayConfig'
        default:
          $ref: '#/components/responses/Error'
  /usage:
    get:
      tags:
        - AI Gateway Usage
      summary: List AI Gateway usage events
      description: |
        List per-attempt AI Gateway usage events for the authenticated account.
        Read-only and account-scoped. Filterable by time range and optionally
        by access key. Paged with an opaque cursor.
      operationId: ListAIGatewayUsage
      parameters:
        - name: startTime
          in: query
          required: true
          description: Only return events with `eventTime` >= this RFC3339 timestamp.
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          required: false
          description: Only return events with `eventTime` <= this RFC3339 timestamp. Defaults to now.
          schema:
            type: string
            format: date-time
        - name: accessKeyId
          in: query
          required: false
          description: Filter results to a single AI Gateway access key.
          schema:
            type: string
        - name: includeRetries
          in: query
          required: false
          description: When true, include retry attempts in addition to the request-level terminal attempt. Defaults to false.
          schema:
            type: boolean
            default: false
        - name: cursor
          in: query
          required: false
          description: Cursor from a previous response's `nextPageUri`. Pass to fetch the next page.
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of AI Gateway usage events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayUsageList'
        default:
          $ref: '#/components/responses/Error'
  /usage/overview:
    get:
      tags:
        - AI Gateway Usage
      summary: AI Gateway usage overview
      description: |
        Aggregated daily cost, request, and error series for the authenticated
        account over a time window, plus window-wide totals. Grouped by provider
        or access key. Read-only and account-scoped.
      operationId: GetAIGatewayUsageOverview
      parameters:
        - name: startTime
          in: query
          required: true
          description: Start of the window as an RFC3339 timestamp. Inclusive.
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          required: false
          description: End of the window as an RFC3339 timestamp. Defaults to now.
          schema:
            type: string
            format: date-time
        - name: groupBy
          in: query
          required: false
          description: Dimension to break the series down by. Defaults to provider.
          schema:
            type: string
            enum:
              - provider
              - accessKey
            default: provider
      responses:
        '200':
          description: The usage overview series and window totals.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIGatewayUsageOverview'
        default:
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    BeforeID:
      name: beforeId
      in: query
