    AccessDimension:
      type: object
      additionalProperties: false
      properties:
        allow:
          type: array
          description: |
            Allowed entries (exact strings in MVP; no wildcards). Omit to
            impose no restriction on this dimension; empty array means
            nothing is allowed.
          items:
            type: string
    AccessScope:
      type: object
      additionalProperties: false
      description: |
        Scope controlling which providers and models are reachable.
        Omit the entire object for allow-all. Each dimension is
        independently optional.
      properties:
        providers:
          allOf:
            - $ref: '#/components/schemas/AccessDimension'
          description: Provider scope. Entries are provider references (catalog providerId or user-defined providerId / aigp_… id).
        models:
          allOf:
            - $ref: '#/components/schemas/AccessDimension'
          description: Model scope. Entries are model ids (e.g. `openai:openai/gpt-4o`, `openai/gpt-4.1`).
    RouterStepKey:
      type: object
      additionalProperties: false
      required:
        - id
