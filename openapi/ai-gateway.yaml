    AIGatewayUsageEvent:
      type: object
      additionalProperties: false
      required:
        - id
        - eventTime
        - requestId
        - accessKeyId
        - provider
        - providerDisplayName
        - model
        - modelDisplayName
        - attemptNumber
        - isFinalAttempt
        - statusCode
        - timedOut
        - isError
        - isStreaming
        - stopReason
        - inputTokens
        - outputTokens
        - cacheReadTokens
        - reasoningTokens
        - totalCost
        - keySource
      properties:
        id:
          type: string
          description: Unique identifier for this attempt event.
        eventTime:
          type: string
          format: date-time
          description: Timestamp at which the upstream attempt completed.
        requestId:
          type: string
          description: ID linking attempts that belong to the same client request.
        accessKeyId:
          type: string
          description: The AI Gateway access key that originated the request.
        provider:
          type: string
          description: AI provider canonical ID, for example `openai`.
        providerDisplayName:
          type: string
          description: Human-readable provider name.
        model:
          type: string
          description: Model canonical ID, for example `gpt-4o-mini`.
        modelDisplayName:
          type: string
          description: Human-readable model name.
        attemptNumber:
          type: integer
          format: int32
          description: 1-based attempt index in the retry chain.
        isFinalAttempt:
          type: boolean
          description: True if this was the terminal attempt for the request.
        statusCode:
          type: integer
          format: int32
          description: HTTP status code returned by the upstream provider.
        timedOut:
          type: boolean
          description: True if the attempt timed out.
        isError:
          type: boolean
          description: True if this attempt was an error (timed out or HTTP 4xx/5xx).
        isStreaming:
          type: boolean
          description: True if the request was a streaming response.
        stopReason:
          type: string
          description: Provider-reported finish reason.
        inputTokens:
          type: integer
          format: int64
          description: Provider-reported input tokens.
        outputTokens:
          type: integer
          format: int64
          description: Provider-reported output tokens.
        cacheReadTokens:
          type: integer
          format: int64
          description: Tokens read from the provider cache.
        reasoningTokens:
          type: integer
          format: int64
          description: Reasoning tokens reported by the provider.
        totalCost:
          type: string
          description: Total cost in US dollars as a decimal string (5-place fractional precision).
        keySource:
          type: string
          description: Source of the provider credential. `ngrok` for managed keys, `user` for BYOK provider keys.
        providerKeyId:
          type: string
          description: The provider key used, when `keySource` is `user`. Absent otherwise.
        providerKeyDisplayName:
          type: string
          description: Redacted display form of the provider key, when `keySource` is `user`. Absent otherwise.
    AIGatewayUsageList:
      type: object
      additionalProperties: false
      required:
        - aiGatewayUsage
        - uri
      properties:
        aiGatewayUsage:
          type: array
          description: A page of AI Gateway usage events, ordered newest first.
          items:
            $ref: '#/components/schemas/AIGatewayUsageEvent'
        uri:
          type: string
          description: URI of this list resource.
        nextPageUri:
          type: string
          nullable: true
          description: URI of the next page of results, or null if there is no next page.
    AIGatewayUsageOverviewBucket:
      type: object
      additionalProperties: false
      required:
        - bucketStart
        - groupKey
        - cost
        - requests
        - errors
      properties:
        bucketStart:
          type: string
          format: date-time
          description: Start of the UTC day bucket.
        groupKey:
          type: string
          description: Provider ID or access key ID, depending on groupBy.
        cost:
          type: string
          description: Cost in US dollars as a decimal string, summed over all attempts.
        requests:
          type: integer
          format: int64
          description: Final-attempt request count.
        errors:
          type: integer
          format: int64
          description: Errored final-attempt count.
    AIGatewayUsageOverviewTotals:
      type: object
      additionalProperties: false
      required:
        - cost
        - requests
        - errors
      properties:
        cost:
          type: string
          description: Total cost over the window in US dollars as a decimal string.
        requests:
          type: integer
          format: int64
          description: Total final-attempt request count over the window.
        errors:
          type: integer
          format: int64
          description: Total errored final-attempt count over the window.
    AIGatewayUsageOverview:
      type: object
      additionalProperties: false
      required:
        - uri
        - buckets
        - totals
      properties:
        uri:
          type: string
          description: URI of this overview resource.
        buckets:
          type: array
          description: Daily series ordered by day then group key.
          items:
            $ref: '#/components/schemas/AIGatewayUsageOverviewBucket'
        totals:
          $ref: '#/components/schemas/AIGatewayUsageOverviewTotals'
  responses:
    Error:
      description: API error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
